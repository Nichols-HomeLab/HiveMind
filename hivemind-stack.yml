services:
  controller:
    image: ghcr.io/nichols-homelab/hivemind:latest
    command: ["/config/hivemind-config.yml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HIVEMIND_GIT_POLL_INTERVAL: "${HIVEMIND_GIT_POLL_INTERVAL:-3600}"
      HIVEMIND_WEBHOOK_SECRET_FILE: /run/secrets/hivemind_webhook_secret
    secrets:
      - source: hivemind_config
        target: /config/hivemind-config.yml
      - source: hivemind_webhook_secret
        target: /run/secrets/hivemind_webhook_secret
    ports:
      - "8080:8080"
    networks:
      - Lab
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s

networks:
  Lab:
    external: true

secrets:
  hivemind_config:
    external: true
    name: hivemind_private_config
  hivemind_webhook_secret:
    external: true
    name: hivemind_webhook_secret
