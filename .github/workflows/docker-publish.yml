name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/docker-publish.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  REGISTRY: git.nicholstech.org
  IMAGE_NAME: nichols-homelab/hivemind

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout from repository host
        env:
          REPOSITORY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}.git
          COMMIT_SHA: ${{ github.sha }}
        run: |
          auth="$(printf 'x-access-token:%s' "$REPOSITORY_TOKEN" | base64 -w0)"
          git init .
          git remote add origin "$REPOSITORY_URL"
          git -c "http.extraHeader=AUTHORIZATION: basic $auth" fetch --depth=1 origin "$COMMIT_SHA"
          unset auth
          git checkout --detach FETCH_HEAD

      - name: Log in to Gitea Container Registry
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          image="$REGISTRY/$IMAGE_NAME"
          ref_name="${GITHUB_REF_NAME//\//-}"
          tags=("$image:$ref_name" "$image:$ref_name-${GITHUB_SHA:0:7}")
          if [ "$GITHUB_REF_NAME" = main ]; then
            tags+=("$image:latest")
          fi
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            tags+=("$image:${GITHUB_REF_NAME#v}")
          fi
          if [ -n "$INPUT_VERSION" ]; then
            tags+=("$image:$INPUT_VERSION")
          fi
          {
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mapfile -t tags <<< "$IMAGE_TAGS"
          build_args=()
          for tag in "${tags[@]}"; do
            build_args+=(--tag "$tag")
          done
          docker build "${build_args[@]}" .
          for tag in "${tags[@]}"; do
            docker push "$tag"
          done
