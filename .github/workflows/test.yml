name: Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout from repository host
        env:
          REPOSITORY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}.git
          COMMIT_SHA: ${{ github.sha }}
        run: |
          auth="$(printf 'x-access-token:%s' "$REPOSITORY_TOKEN" | base64 -w0)"
          git init .
          git remote add origin "$REPOSITORY_URL"
          git -c "http.extraHeader=AUTHORIZATION: basic $auth" fetch --depth=1 origin "$COMMIT_SHA"
          unset auth
          git checkout --detach FETCH_HEAD

      - name: Build Docker image
        run: docker build --tag hivemind:test .

      - name: Test Docker image
        run: |
          docker run --rm hivemind:test sh -c "python3 -c 'from src import main, controller, git_manager, stack_manager; print(\"All imports successful\")'"
