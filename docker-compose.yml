services:
  hivemind:
    build: .
    image: ghcr.io/nichols-homelab/hivemind:latest
    container_name: hivemind-controller
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hivemind-state:/var/lib/hivemind
    environment:
      - PYTHONUNBUFFERED=1
      - HIVEMIND_GIT_URL=
      - HIVEMIND_GIT_BRANCH=main
      - HIVEMIND_GIT_PATH=.
      - HIVEMIND_GIT_POLL_INTERVAL=${HIVEMIND_GIT_POLL_INTERVAL:-3600}
      - HIVEMIND_GIT_USERNAME=
      - HIVEMIND_GIT_PASSWORD=
      - HIVEMIND_SMTP_HOST=ntfy.nicholstech.org
      - HIVEMIND_SMTP_PORT=1025
      - HIVEMIND_SMTP_FROM=hivemind@nicholstech.org
      - HIVEMIND_SMTP_TO=docker@ntfy.nicholstech.org
      - HIVEMIND_SMTP_PRIORITY=1
      - HIVEMIND_SMTP_TLS=false
      - HIVEMIND_WEBUI_ENABLED=true
      - HIVEMIND_WEBUI_PORT=8080
      - HIVEMIND_WEBHOOK_SECRET=${HIVEMIND_WEBHOOK_SECRET:-}
      - HIVEMIND_MEDIA_UPDATE_ENABLED=${HIVEMIND_MEDIA_UPDATE_ENABLED:-true}
      - HIVEMIND_PLEX_STACKS=${HIVEMIND_PLEX_STACKS:-plex}
      - HIVEMIND_PLEX_URL=${HIVEMIND_PLEX_URL:-}
      - HIVEMIND_PLEX_TOKEN=${HIVEMIND_PLEX_TOKEN:-}
      - HIVEMIND_JELLYFIN_STACKS=${HIVEMIND_JELLYFIN_STACKS:-jellyfin}
      - HIVEMIND_JELLYFIN_URL=${HIVEMIND_JELLYFIN_URL:-}
      - HIVEMIND_JELLYFIN_API_KEY=${HIVEMIND_JELLYFIN_API_KEY:-}
      - HIVEMIND_MEDIA_UPDATE_TIMEZONE=${HIVEMIND_MEDIA_UPDATE_TIMEZONE:-America/New_York}
      - HIVEMIND_MEDIA_UPDATE_HOUR=${HIVEMIND_MEDIA_UPDATE_HOUR:-0}
      - HIVEMIND_MEDIA_UPDATE_MINUTE=${HIVEMIND_MEDIA_UPDATE_MINUTE:-0}
      - HIVEMIND_MEDIA_UPDATE_WINDOW_MINUTES=${HIVEMIND_MEDIA_UPDATE_WINDOW_MINUTES:-60}
      - HIVEMIND_MEDIA_UPDATE_BACKOFF_SECONDS=${HIVEMIND_MEDIA_UPDATE_BACKOFF_SECONDS:-300}
      - HIVEMIND_MEDIA_UPDATE_MAX_BACKOFF_SECONDS=${HIVEMIND_MEDIA_UPDATE_MAX_BACKOFF_SECONDS:-21600}
      - HIVEMIND_MEDIA_UPDATE_MAX_DEFERRAL_DAYS=${HIVEMIND_MEDIA_UPDATE_MAX_DEFERRAL_DAYS:-3}
      - HIVEMIND_MEDIA_API_TIMEOUT_SECONDS=${HIVEMIND_MEDIA_API_TIMEOUT_SECONDS:-10}
      - HIVEMIND_MEDIA_UPDATE_STATE_FILE=${HIVEMIND_MEDIA_UPDATE_STATE_FILE:-/var/lib/hivemind/media-update-state.json}
    restart: unless-stopped
    networks:
      - hivemind

networks:
  hivemind:
    driver: bridge

volumes:
  hivemind-state:
